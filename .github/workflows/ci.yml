name: CI Pipeline

on:
  push:
    branches:
      - david-assignment2-testing
  pull_request:
    branches:
      - david-assignment2-testing

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout repository
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Setup Node.js
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # =========================
      # BACKEND TESTING 
      # =========================

      - name: Install backend dependencies
        run: |
         cd backend
         npm install

     - name: Run backend tests
       run: |
         cd backend
         npm test

      # =========================
      # FRONTEND BUILD 
      # =========================
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build
