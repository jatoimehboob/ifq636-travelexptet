name: CI

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'

  - name: Install root dependencies
    run: npm install

  - name: Install frontend dependencies
    run: |
      cd frontend
      npm install
      chmod +x node_modules/.bin/react-scripts

  - name: Build frontend
    run: |
      cd frontend
      npm run build
```
