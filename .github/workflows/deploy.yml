name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd ~/ifq636-travelexptet
          git pull origin main

      - name: Install dependencies
        run: |
          cd ~/ifq636-travelexptet
          npm install
          cd frontend && npm install
          cd ../backend && npm install

      - name: Build frontend
        run: |
          cd ~/ifq636-travelexptet/frontend
          npm run build

      - name: Restart backend
        run: |
          pm2 restart backend

      - name: Restart frontend
        run: |
          pm2 restart frontend

      - name: Save PM2
        run: |
          pm2 save
